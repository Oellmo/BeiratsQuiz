<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vorstands-Team-Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f8faff 0%, #f0f4ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .option-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .option-card.selected-t1 { border-color: #3b82f6; background-color: #eff6ff; }
        .option-card.selected-t2 { border-color: #ef4444; background-color: #fef2f2; }
        .option-card.is-correct { border-color: #22c55e; background-color: #f0fdf4; }
        .option-card.is-wrong { opacity: 0.6; }

        .result-badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 800;
            display: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-5xl mx-auto w-full flex justify-between items-center mb-12">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">Q</div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tighter uppercase">Team Quiz</h1>
        </div>
        <div id="turn-indicator" class="px-6 py-2 rounded-full font-bold text-sm uppercase tracking-widest bg-white shadow-sm border border-slate-100">
            Warten auf Start...
        </div>
    </header>

    <main class="max-w-5xl mx-auto w-full flex-1">
        <div id="quiz-container" class="hidden">
            <!-- Score Header -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass-card p-6 rounded-3xl border-b-4 border-blue-500">
                    <span class="text-xs font-black text-blue-600 uppercase tracking-widest block mb-1">Team Blau</span>
                    <div id="score-t1" class="text-4xl font-black text-slate-900">0</div>
                </div>
                <div class="glass-card p-6 rounded-3xl border-b-4 border-red-500">
                    <span class="text-xs font-black text-red-600 uppercase tracking-widest block mb-1">Team Rot</span>
                    <div id="score-t2" class="text-4xl font-black text-slate-900">0</div>
                </div>
            </div>

            <!-- Question Card -->
            <div class="glass-card rounded-[2.5rem] overflow-hidden">
                <div class="bg-slate-900 p-3 px-8">
                    <span id="topic-label" class="text-white/60 text-[10px] font-black uppercase tracking-[0.2em]">Themenbereich</span>
                </div>
                <div class="p-8 md:p-12">
                    <h2 id="question-text" class="text-3xl md:text-4xl font-extrabold text-slate-900 leading-tight mb-12">Lade Fragen...</h2>
                    
                    <div id="options-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <!-- Options injected by JS -->
                    </div>
                </div>
            </div>

            <div class="mt-12 flex justify-center">
                <button id="main-action" onclick="handleMainAction()" class="bg-slate-900 hover:bg-slate-800 text-white px-12 py-5 rounded-2xl font-black uppercase tracking-widest transition-all shadow-xl hover:shadow-2xl active:scale-95 disabled:opacity-50">
                    <span id="btn-text">Antworten einloggen</span>
                </button>
            </div>
        </div>

        <div id="loading-container" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-slate-900 mb-4"></div>
            <p class="font-bold text-slate-500 uppercase tracking-widest text-sm">Initialisiere Quiz...</p>
        </div>
    </main>

    <script>
        let questions = [];
        let currentIdx = 0;
        let scoreT1 = 0;
        let scoreT2 = 0;
        let turn = 1; // 1 = Team Blau wählt, 2 = Team Rot wählt
        let selectedT1 = null;
        let selectedT2 = null;
        let revealed = false;

        async function loadQuestions() {
            try {
                // Versuche die JSON-Datei zu laden (GitHub Pages)
                const response = await fetch('fragen.json');
                if (!response.ok) throw new Error('Netzwerk-Antwort war nicht ok');
                
                questions = await response.json();
                console.log("Daten erfolgreich aus JSON geladen:", questions);
                
                // Initialisiere UI
                document.getElementById('loading-container').classList.add('hidden');
                document.getElementById('quiz-container').classList.remove('hidden');
                updateUI();
            } catch (error) {
                console.error("Fehler beim Laden der JSON:", error);
                document.querySelector('#loading-container p').innerText = "Fehler beim Laden der fragen.json!";
                document.querySelector('#loading-container p').classList.add('text-red-500');
            }
        }

        function updateUI() {
            if (questions.length === 0) return;
            
            const q = questions[currentIdx];
            document.getElementById('topic-label').innerText = q.topic;
            document.getElementById('question-text').innerText = q.q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            q.opts.forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = `option-card glass-card p-6 rounded-3xl cursor-pointer relative group`;
                card.onclick = () => selectOption(i);
                card.id = `opt-${i}`;
                
                card.innerHTML = `
                    <div id="badge-${i}" class="result-badge mb-2">Resultat</div>
                    <div class="text-2xl font-black text-slate-900 mb-2">${opt.val}</div>
                    <div class="text-sm text-slate-500 font-medium leading-relaxed">${opt.desc}</div>
                    <div id="indicator-${i}" class="absolute top-4 right-4 flex gap-1"></div>
                `;
                grid.appendChild(card);
            });

            revealed = false;
            selectedT1 = null;
            selectedT2 = null;
            turn = 1;
            document.getElementById('btn-text').innerText = "Antworten einloggen";
            updateTurnIndicator();
        }

        function selectOption(idx) {
            if (revealed) return;

            if (turn === 1) {
                selectedT1 = idx;
                turn = 2;
            } else {
                selectedT2 = idx;
                turn = 1;
            }
            
            updateVisualSelection();
            updateTurnIndicator();
        }

        function updateVisualSelection() {
            for (let i = 0; i < 3; i++) {
                const card = document.getElementById(`opt-${i}`);
                const ind = document.getElementById(`indicator-${i}`);
                card.className = "option-card glass-card p-6 rounded-3xl cursor-pointer relative group";
                ind.innerHTML = '';

                if (selectedT1 === i) {
                    card.classList.add('selected-t1');
                    ind.innerHTML += `<div class="w-3 h-3 rounded-full bg-blue-500"></div>`;
                }
                if (selectedT2 === i) {
                    card.classList.add('selected-t2');
                    ind.innerHTML += `<div class="w-3 h-3 rounded-full bg-red-500"></div>`;
                }
            }
        }

        function updateTurnIndicator() {
            const ind = document.getElementById('turn-indicator');
            if (revealed) {
                ind.innerText = "Auswertung";
                ind.className = "px-6 py-2 rounded-full font-bold text-sm uppercase tracking-widest bg-slate-900 text-white shadow-sm";
            } else if (turn === 1) {
                ind.innerText = "Team Blau wählt...";
                ind.className = "px-6 py-2 rounded-full font-bold text-sm uppercase tracking-widest bg-blue-50 text-blue-600 border border-blue-100";
            } else {
                ind.innerText = "Team Rot wählt...";
                ind.className = "px-6 py-2 rounded-full font-bold text-sm uppercase tracking-widest bg-red-50 text-red-600 border border-red-100";
            }
        }

        function handleMainAction() {
            if (!revealed) {
                if (selectedT1 === null || selectedT2 === null) return;
                
                revealed = true;
                const q = questions[currentIdx];
                
                if (selectedT1 === q.correct) scoreT1++;
                if (selectedT2 === q.correct) scoreT2++;
                
                document.getElementById('score-t1').innerText = scoreT1;
                document.getElementById('score-t2').innerText = scoreT2;

                // Visual Reveal
                for (let i = 0; i < 3; i++) {
                    const card = document.getElementById(`opt-${i}`);
                    const badge = document.getElementById(`badge-${i}`);
                    
                    if (i === q.correct) {
                        card.classList.add('is-correct');
                        badge.innerText = "Korrekt";
                        badge.className = "result-badge bg-green-500 text-white block";
                    } else if (selectedT1 === i || selectedT2 === i) {
                        card.classList.add('is-wrong');
                        badge.innerText = "Falsch";
                        badge.className = "result-badge bg-red-600 text-white block";
                    }
                }
                document.getElementById('btn-text').innerText = "Nächste Frage";
                updateTurnIndicator();
            } else {
                if (currentIdx < questions.length - 1) {
                    currentIdx++;
                    updateUI();
                } else {
                    showEndScreen();
                }
            }
        }

        function showEndScreen() {
            const winner = scoreT1 > scoreT2 ? "Team Blau" : (scoreT2 > scoreT1 ? "Team Rot" : "Unentschieden");
            document.querySelector('main').innerHTML = `
                <div class="glass-card w-full py-20 px-12 text-center mt-8 rounded-[3rem]">
                    <h1 class="text-5xl font-black text-slate-900 mb-6 uppercase tracking-tighter">FINALE!</h1>
                    <p class="text-2xl font-bold mb-10 text-slate-600">${winner} hat die meisten Punkte!</p>
                    <button onclick="location.reload()" class="bg-slate-900 text-white px-12 py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">Neustart</button>
                </div>
            `;
        }

        // Starte App
        window.onload = loadQuestions;
    </script>
</body>
</html>
